name: Update canonical domains
on:
  workflow_dispatch:  # se ejecuta manualmente

permissions:
  contents: write     # habilita al token para hacer push

jobs:
  replace:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Replace canonical domains
        run: |
          find . -name '*.html' -exec sed -i \
            's#https://regularizacion-2026\.vercel\.app#https://regularizacion-2026-eight.vercel.app#g' {} +

      - name: Commit and push changes
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No hay cambios que publicar"
          else
            git commit -m "chore: update canonical domain"
            git push
          fi
