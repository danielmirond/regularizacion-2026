name: Update canonical domains
on:
  workflow_dispatch:  # se ejecuta de forma manual desde la pestaña "Actions"

jobs:
  replace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Replace canonical domains
        run: |
          find . -name '*.html' -exec sed -i \
            's#https://regularizacion-2026\.vercel\.app#https://regularizacion-2026-eight.vercel.app#g' {} +

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No hay cambios que publicar"
          else
            git commit -am "chore: update canonical domain"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
